name: Generador Audiolibro IA

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generar:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Crear script Python
        run: |
          cat << 'EOF' > script.py
          import requests
          import os
          from datetime import datetime
          import json

          API_KEY = os.getenv("GEMINI_API_KEY")

          if not API_KEY:
              raise ValueError("API KEY no encontrada")

          prompt = "Escribe un gancho emocional corto para un audiolibro."

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={API_KEY}"

          headers = {
              "Content-Type": "application/json"
          }

          data = {
              "contents": [
                  {
                      "parts": [{"text": prompt}]
                  }
              ]
          }

          response = requests.post(url, headers=headers, json=data)

          print("STATUS:", response.status_code)
          print("RAW RESPONSE:", response.text)

          if response.status_code != 200:
              raise Exception(f"Error API: {response.text}")

          result = response.json()

          try:
              text = result["candidates"][0]["content"]["parts"][0]["text"]
          except Exception as e:
              raise Exception(f"Error parseando respuesta: {result}")

          filename = f"capitulo_{datetime.now().strftime('%Y%m%d_%H%M%S')}.txt"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(text)

          print("Archivo generado:", filename)
          EOF

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script
        run: python3 script.py

      - name: Subir resultado
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "Nuevo capítulo generado" || echo "Nada que commitear"
          git push
