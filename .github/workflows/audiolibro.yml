name: Máquina Autoayuda - Groq Qwen3-32b (Fast v1)

on:
  schedule:
    - cron: "*/12 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: audiolibro-groq
  cancel-in-progress: false

jobs:
  generar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generar 1 bloque optimizado
        shell: bash
        run: |
          cat << 'EOF' > generate.py
          import os
          import glob
          import time
          import json
          import requests

          API_KEY = os.getenv("GROQ_API_KEY")
          if not API_KEY:
              print("❌ GROQ_API_KEY no encontrada")
              raise SystemExit(1)

          existing = sorted(glob.glob("capitulo_*_bloque_*.txt"))
          if not existing:
              chapter_num = 1
              block_num = 1
          else:
              last = existing[-1]
              chapter_num = int(last.split("_")[1])
              block_num = int(last.split("_")[3].split(".")[0]) + 1
              if block_num > 7:
                  chapter_num += 1
                  block_num = 1

          titles = [
              "El Ancla Invisible",
              "La Jaula que Tú Construiste",
              "El Precio de Seguir Cómodo",
              "La Identidad que Te Mata Lentamente",
              "Por Qué Saboteas Tu Propio Éxito",
              "El Miedo que Nadie Habla",
              "Cuando Dejas de Mentirte a Ti Mismo",
              "La Versión de Ti que Está Esperando",
              "El Vacío que el Éxito No Llena"
          ]

          title = titles[(chapter_num - 1) % len(titles)]
          print(f"🚀 Capítulo {chapter_num} - Bloque {block_num}: {title}")

          prompt = f"""Genera el BLOQUE {block_num} de 7 del capítulo "{title}" de autoayuda oscura.

          Reglas estrictas:
          - Español natural y potente
          - Texto final listo, sin borrador
          - Frases cortas
          - Ritmo oral, emocional, hipnótico
          - Usa pausas con "..."
          - Preguntas retóricas fuertes
          - Sin títulos
          - Sin etiquetas
          - Sin "BLOQUE"
          - Sin explicaciones
          - Sin razonamiento
          - Sin <think>
          - Entre 170 y 230 palabras aprox.

          Objetivo:
          - Debe sonar como narración premium para audiolibro / spoken word
          - Debe aumentar tensión emocional
          - Debe dejar ganas de escuchar el siguiente bloque

          Responde SOLO con el texto final.
          """

          url = "https://api.groq.com/openai/v1/chat/completions"
          headers = {
              "Authorization": f"Bearer {API_KEY}",
              "Content-Type": "application/json"
          }

          data = {
              "model": "qwen/qwen3-32b",
              "messages": [
                  {"role": "user", "content": prompt}
              ],
              "temperature": 0.72,
              "max_tokens": 900
          }

          def post_with_retry(url, headers, payload, attempts=4, timeout=90):
              last_error = None
              for attempt in range(1, attempts + 1):
                  try:
                      response = requests.post(url, headers=headers, json=payload, timeout=timeout)
                      if response.status_code >= 400:
                          raise RuntimeError(f"HTTP {response.status_code}: {response.text[:500]}")
                      body = response.json()
                      content = body["choices"][0]["message"]["content"].strip()
                      if not content:
                          raise RuntimeError("Respuesta vacía del modelo")
                      return content
                  except Exception as e:
                      last_error = e
                      wait_time = min(20, attempt * 4)
                      print(f"⚠️ Intento {attempt}/{attempts} falló: {e}")
                      if attempt < attempts:
                          print(f"⏳ Reintentando en {wait_time}s...")
                          time.sleep(wait_time)
              raise RuntimeError(f"❌ Fallaron todos los intentos: {last_error}")

          final_text = post_with_retry(url, headers, data)

          # Limpieza
          if "</think>" in final_text:
              final_text = final_text.split("</think>")[-1].strip()
          final_text = final_text.replace("<think>", "").replace("</think>", "").strip()

          lines = final_text.splitlines()
          clean_lines = []
          for line in lines:
              s = line.strip()
              if not s:
                  clean_lines.append("")
                  continue
              if s.upper().startswith("BLOQUE"):
                  continue
              if s.startswith("**"):
                  continue
              clean_lines.append(line)

          final_text = "\n".join(clean_lines).strip()

          filename = f"capitulo_{chapter_num:02d}_bloque_{block_num}.txt"
          with open(filename, "w", encoding="utf-8") as f:
              f.write(final_text)

          print(f"✅ Guardado: {filename} ({len(final_text.split())} palabras)")
          EOF

          python generate.py

      - name: Commit y Push
        shell: bash
        run: |
          git config --global user.name "AudiolibroBot"
          git config --global user.email "bot@yordev.ai"
          git add capitulo_*.txt
          git diff --cached --quiet && echo "No hay cambios" && exit 0
          git commit -m "🤖 Bloque Qwen3-32b fast v1 - $(date '+%Y-%m-%d %H:%M')"
          git push
