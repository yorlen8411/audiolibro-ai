name: Generador Audiolibro IA - Capítulo 1 (Optimizado para Applio TTS)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar Bloque 9 OPTIMIZADO PARA APPLIO
        run: |
          cat << 'EOF' > generate_chapter.py
          import requests, os, glob
          from datetime import datetime

          API_KEY = os.getenv("GEMINI_API_KEY")
          if not API_KEY: raise ValueError("❌ GEMINI_API_KEY no encontrada")

          bloques = sorted(glob.glob("cap1_bloque_*.txt"))
          contexto = ""
          for i, archivo in enumerate(bloques, 1):
              with open(archivo, "r", encoding="utf-8") as f:
                  contexto += f"\n\nBLOQUE {i}:\n{f.read().strip()}\n"

          prompt = f"""Eres un escritor experto en scripts de audiolibros premium para TTS local como Applio (RVC + StyleTTS2 o similar).
          El texto generado será leído por voz IA offline, por lo que debe ser 100% optimizado para spoken-word.

          Estilo obligatorio:
          - Frases muy cortas y conversacionales (máximo 15-20 palabras por frase).
          - Muchas pausas dramáticas con "...".
          - Repeticiones intencionales para énfasis emocional.
          - Lenguaje sensorial y cinematográfico.
          - Ritmo lento, hipnótico y adictivo.
          - Saltos de línea frecuentes para que la voz respire naturalmente.

          Genera **SOLO** el BLOQUE 9 del Capítulo 1 "El Ancla Invisible".
          Continúa exactamente después del Bloque 8.

          Bloques anteriores (mantén coherencia total):
          {contexto}

          REQUISITOS ESTRICTOS PARA APPLIO:
          - Longitud: 520-680 palabras.
          - Intensifica el miedo al ser visto, al vacío interior y a soltar el ancla.
          - Construye tensión emocional creciente.
          - Termina con un cierre poderoso que deje al oyente con "ya no hay vuelta atrás" y ansias por continuar.
          - Nunca cortes una idea a la mitad. Todo debe fluir perfecto para narración spoken-word.

          Responde **ÚNICAMENTE** con el texto puro del bloque. Sin títulos, sin explicaciones, sin nada más."""

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={API_KEY}"

          data = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {
                  "temperature": 0.85,
                  "topP": 0.92,
                  "maxOutputTokens": 4096,
              },
              "safetySettings": [{"category": c, "threshold": "BLOCK_NONE"} for c in ["HARM_CATEGORY_HARASSMENT","HARM_CATEGORY_HATE_SPEECH","HARM_CATEGORY_SEXUALLY_EXPLICIT","HARM_CATEGORY_DANGEROUS_CONTENT"]]
          }

          r = requests.post(url, headers={"Content-Type": "application/json"}, json=data)
          if r.status_code != 200: raise Exception(f"API Error: {r.text}")

          text = r.json()["candidates"][0]["content"]["parts"][0]["text"].strip()

          timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
          filename = f"cap1_bloque_{timestamp}.txt"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(text)

          print(f"✅ BLOQUE GENERADO PARA APPLIO: {filename} ({len(text.split())} palabras)")
          print(text[:900] + "..." if len(text) > 900 else text)
          EOF

          python3 generate_chapter.py
        shell: bash

      - name: Commit y Push
        run: |
          git config --global user.name "AudiolibroBot"
          git config --global user.email "bot@yordev.ai"
          git add cap1_bloque_*.txt
          git commit -m "🤖 Bloque 9 optimizado para Applio TTS - $(date '+%Y-%m-%d %H:%M')" || echo "No hay cambios"
          git push
