name: Máquina Infinita de Capítulos Autoayuda

on:
  schedule:
    - cron: "*/5 * * * *"   # Cada 5 minutos mientras pruebas
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar Nuevo Capítulo (7 bloques)
        run: |
          cat << 'EOF' > generate.py
          import requests, os, glob, time
          from datetime import datetime
          import random

          API_KEY = os.getenv("GEMINI_API_KEY")
          if not API_KEY:
              raise ValueError("API KEY no encontrada")

          existing = glob.glob("capitulo_*_bloque_1.txt")
          chapter_num = len(existing) + 1

          titles = ["El Ancla Invisible", "La Jaula que Tú Construiste", "El Precio de Seguir Cómodo", "La Identidad que Te Mata Lentamente", "Por Qué Saboteas Tu Propio Éxito", "El Miedo que Nadie Habla", "Cuando Dejas de Mentirte a Ti Mismo", "La Versión de Ti que Está Esperando", "El Vacío que el Éxito No Llena", "Rompiendo la Historia que Te Define"]

          title = titles[(chapter_num-1) % len(titles)]

          print(f"Generando Capítulo {chapter_num}: {title}")

          for b in range(1,8):
              prompt = f"""Genera el BLOQUE {b} de 7 del capítulo "{title}" de autoayuda.
              Frases cortas. Muchas "...". Saltos de línea. Habla directo a "tú". Estilo spoken-word emocional."""

              url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={API_KEY}"
              data = {"contents": [{"parts": [{"text": prompt}]}],"generationConfig": {"temperature": 0.85, "maxOutputTokens": 2048}}

              r = requests.post(url, headers={"Content-Type": "application/json"}, json=data)
              text = r.json()["candidates"][0]["content"]["parts"][0]["text"].strip()

              with open(f"capitulo_{chapter_num:02d}_bloque_{b}.txt", "w", encoding="utf-8") as f:
                  f.write(text)

              print(f"Bloque {b} listo")
              time.sleep(8)
          EOF

          python3 generate.py
        shell: bash

      - name: Commit y Push
        run: |
          git config --global user.name "AudiolibroBot"
          git config --global user.email "bot@yordev.ai"
          git add capitulo_*.txt
          git commit -m "Nuevo capítulo generado automáticamente" || echo "Sin cambios"
          git push
