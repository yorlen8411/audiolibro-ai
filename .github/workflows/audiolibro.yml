name: Máquina Autoayuda - Groq Qwen3-32b (Anti-Thinking + Mejora)

on:
  schedule:
    - cron: "*/12 * * * *"   
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar Bloque con Pipeline Anti-Thinking
        run: |
          cat << 'EOF' > generate.py
          import requests, os, glob, time
          from datetime import datetime

          API_KEY = os.getenv("GROQ_API_KEY")
          if not API_KEY:
              print("❌ GROQ_API_KEY no encontrada")
              exit(1)

          # Calcular siguiente bloque
          existing = sorted(glob.glob("capitulo_*_bloque_*.txt"))
          if not existing:
              chapter_num = 1
              block_num = 1
          else:
              last = existing[-1]
              chapter_num = int(last.split("_")[1])
              block_num = int(last.split("_")[3].split(".")[0]) + 1
              if block_num > 7:
                  chapter_num += 1
                  block_num = 1

          titles = ["El Ancla Invisible", "La Jaula que Tú Construiste", "El Precio de Seguir Cómodo", "La Identidad que Te Mata Lentamente", "Por Qué Saboteas Tu Propio Éxito", "El Miedo que Nadie Habla", "Cuando Dejas de Mentirte a Ti Mismo", "La Versión de Ti que Está Esperando", "El Vacío que el Éxito No Llena"]

          title = titles[(chapter_num-1) % len(titles)]

          print(f"🚀 Capítulo {chapter_num} - Bloque {block_num}: {title}")

          # Paso 1: Borrador
          prompt_borrador = f"""Genera el BLOQUE {block_num} de 7 del capítulo "{title}" de autoayuda.
          Frases cortas, pausas con "...", preguntas retóricas, tono emocional profundo."""

          # Paso 2: Refinamiento fuerte
          prompt_refinar = f"""Reescribe el siguiente texto para que sea mucho más poderoso, emocional y adictivo para spoken-word premium.

          Reglas estrictas:
          - Frases extremadamente cortas (8-14 palabras máximo)
          - Muchas pausas dramáticas con "..."
          - Muchas preguntas retóricas fuertes
          - Aumenta la tensión emocional progresiva
          - Hazlo sensorial y cinematográfico
          - Ritmo hipnótico y profundo
          - Responde SOLO con el texto mejorado. NADA más. Sin <think>, sin explicaciones, sin razonamiento.

          Texto original:
          {{draft}}

          Responde solo con el texto mejorado."""

          url = "https://api.groq.com/openai/v1/chat/completions"
          headers = {"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json"}

          # Primera llamada - Borrador
          data = {
              "model": "qwen/qwen3-32b",
              "messages": [{"role": "user", "content": prompt_borrador}],
              "temperature": 0.72,
              "max_tokens": 800
          }
          response = requests.post(url, headers=headers, json=data, timeout=40)
          draft = response.json()["choices"][0]["message"]["content"].strip()

          # Segunda llamada - Refinamiento
          data["messages"] = [{"role": "user", "content": prompt_refinar.format(draft=draft)}]
          response = requests.post(url, headers=headers, json=data, timeout=40)
          final_text = response.json()["choices"][0]["message"]["content"].strip()

          # Limpieza AGRESIVA contra <think>
          if "<think>" in final_text:
              final_text = final_text.split("</think>")[-1].strip()
          final_text = final_text.replace("<think>", "").replace("</think>", "").strip()

          filename = f"capitulo_{chapter_num:02d}_bloque_{block_num}.txt"
          with open(filename, "w", encoding="utf-8") as f:
              f.write(final_text)

          print(f"✅ Guardado (refinado): {filename} ({len(final_text.split())} palabras)")
          EOF

          python3 generate.py
        shell: bash

      - name: Commit y Push
        run: |
          git config --global user.name "AudiolibroBot"
          git config --global user.email "bot@yordev.ai"
          git add capitulo_*.txt
          git commit -m "🤖 Bloque Qwen3-32b pipeline v7 - $(date '+%Y-%m-%d %H:%M')" || echo "No hay cambios"
          git push
