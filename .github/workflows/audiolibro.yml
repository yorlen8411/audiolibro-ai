name: Máquina Autoayuda - Generador de Capítulos (Versión Estable)

on:
  schedule:
    - cron: "*/10 * * * *"   # Cada 10 minutos (más seguro)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar Nuevo Capítulo (7 bloques) - Con manejo de errores
        run: |
          cat << 'EOF' > generate.py
          import requests, os, glob, time
          from datetime import datetime

          API_KEY = os.getenv("GEMINI_API_KEY")
          if not API_KEY:
              print("❌ ERROR CRÍTICO: GEMINI_API_KEY no encontrada en Secrets")
              exit(1)

          existing = glob.glob("capitulo_*_bloque_1.txt")
          chapter_num = len(existing) + 1

          titles = [
              "El Ancla Invisible", "La Jaula que Tú Construiste", "El Precio de Seguir Cómodo",
              "La Identidad que Te Mata Lentamente", "Por Qué Saboteas Tu Propio Éxito",
              "El Miedo que Nadie Habla", "Cuando Dejas de Mentirte a Ti Mismo"
          ]

          title = titles[(chapter_num-1) % len(titles)]

          print(f"🚀 Iniciando Capítulo {chapter_num}: {title}")

          for block in range(1, 8):
              prompt = f"""Genera el BLOQUE {block} de 7 del capítulo de autoayuda titulado "{title}".
              Estilo spoken-word: frases cortas, muchas pausas con "...", saltos de línea frecuentes, habla directo al oyente ("tú"). 
              Mantén un tono emocional y motivacional."""

              url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={API_KEY}"

              data = {
                  "contents": [{"parts": [{"text": prompt}]}],
                  "generationConfig": {
                      "temperature": 0.82,
                      "maxOutputTokens": 2048
                  },
                  "safetySettings": [
                      {"category": "HARM_CATEGORY_HARASSMENT", "threshold": "BLOCK_NONE"},
                      {"category": "HARM_CATEGORY_HATE_SPEECH", "threshold": "BLOCK_NONE"},
                      {"category": "HARM_CATEGORY_SEXUALLY_EXPLICIT", "threshold": "BLOCK_NONE"},
                      {"category": "HARM_CATEGORY_DANGEROUS_CONTENT", "threshold": "BLOCK_NONE"}
                  ]
              }

              try:
                  response = requests.post(url, headers={"Content-Type": "application/json"}, json=data, timeout=40)
                  print(f"Status Bloque {block}: {response.status_code}")

                  if response.status_code != 200:
                      print("Respuesta completa de error:")
                      print(response.text)
                      raise Exception(f"API HTTP Error {response.status_code}")

                  result = response.json()

                  # Manejo robusto del response
                  if "candidates" not in result or not result["candidates"]:
                      print("⚠️ No candidates en la respuesta. Posible safety block o error.")
                      print("Respuesta completa:", result)
                      # Fallback simple
                      text = "El bloque no se generó correctamente debido a filtros de seguridad."
                  else:
                      text = result["candidates"][0]["content"]["parts"][0]["text"].strip()

                  filename = f"capitulo_{chapter_num:02d}_bloque_{block}.txt"
                  with open(filename, "w", encoding="utf-8") as f:
                      f.write(text)

                  print(f"✅ Bloque {block} guardado correctamente ({len(text.split())} palabras)")
              except Exception as e:
                  print(f"❌ Error grave en bloque {block}: {str(e)}")
                  raise

              time.sleep(12)

          print(f"🎉 Capítulo {chapter_num} completado")
          EOF

          python3 generate.py
        shell: bash

      - name: Commit y Push
        run: |
          git config --global user.name "AudiolibroBot"
          git config --global user.email "bot@yordev.ai"
          git add capitulo_*.txt
          git commit -m "🤖 Nuevo capítulo autoayuda generado - $(date '+%Y-%m-%d %H:%M')" || echo "No hay cambios"
          git push
