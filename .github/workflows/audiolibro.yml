name: Generador Audiolibro IA - Capítulo 1 (Gancho YouTube - Optimizado Applio)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar Bloque 9 o 10 (Estructura PRO para Applio)
        run: |
          cat << 'EOF' > generate_chapter.py
          import requests, os, glob
          from datetime import datetime

          API_KEY = os.getenv("GEMINI_API_KEY")
          if not API_KEY:
              raise ValueError("❌ GEMINI_API_KEY no encontrada")

          bloques = sorted(glob.glob("cap1_bloque_*.txt"))
          contexto = ""
          for i, archivo in enumerate(bloques, 1):
              with open(archivo, "r", encoding="utf-8") as f:
                  contexto += f"\n\nBLOQUE {i}:\n{f.read().strip()}\n"

          prompt = f"""Eres escritor experto en scripts de audiolibros y YouTube spoken-word premium.
          Genera el siguiente bloque del Capítulo 1 "El Ancla Invisible" (contenido gancho gratuito para YouTube).

          Estilo exacto requerido (igual que los ejemplos de ChatGPT):
          - Frases muy cortas y conversacionales.
          - Muchas pausas dramáticas con "...".
          - Saltos de línea frecuentes (uno por frase o pausa).
          - Repeticiones intencionales para crear ritmo hipnótico.
          - Lenguaje sensorial, emocional y cinematográfico.
          - Ritmo lento y adictivo, perfecto para TTS lento.

          Velocidad recomendada para Applio (según bloque):
          - Bloques iniciales/gancho → velocidad -15
          - Bloques medios/emocionales → velocidad -25 a -32
          - Bloque de cierre → velocidad -25

          Continúa exactamente después del último bloque generado.

          Bloques anteriores para coherencia total:
          {contexto}

          Genera **SOLO** el siguiente bloque (número {len(bloques)+1}).
          Longitud ideal: 180-280 palabras por bloque (para que con velocidad lenta dé ~1-1.5 minutos por bloque).
          Mantén el mismo tono profundo, poético y motivacional.

          Responde **ÚNICAMENTE** con el texto puro del bloque. 
          Usa saltos de línea frecuentes.
          No agregues títulos, números ni explicaciones."""

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={API_KEY}"

          data = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {
                  "temperature": 0.83,
                  "topP": 0.91,
                  "maxOutputTokens": 8192,
              },
              "safetySettings": [{"category": c, "threshold": "BLOCK_NONE"} for c in ["HARM_CATEGORY_HARASSMENT","HARM_CATEGORY_HATE_SPEECH","HARM_CATEGORY_SEXUALLY_EXPLICIT","HARM_CATEGORY_DANGEROUS_CONTENT"]]
          }

          response = requests.post(url, headers={"Content-Type": "application/json"}, json=data)
          if response.status_code != 200:
              raise Exception(f"API Error: {response.status_code}")

          text = response.json()["candidates"][0]["content"]["parts"][0]["text"].strip()

          timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
          filename = f"cap1_bloque_{timestamp}.txt"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(text)

          print(f"✅ BLOQUE {len(bloques)+1} GENERADO PARA APPLIO: {filename}")
          print(f"Palabras aprox: {len(text.split())}")
          print("\n--- VISTA PREVIA ---")
          print(text[:700] + "..." if len(text) > 700 else text)
          EOF

          python3 generate_chapter.py
        shell: bash

      - name: Commit y Push
        run: |
          git config --global user.name "AudiolibroBot"
          git config --global user.email "bot@yordev.ai"
          git add cap1_bloque_*.txt
          git commit -m "🤖 Nuevo bloque Capítulo 1 (estructura Applio) - $(date '+%Y-%m-%d %H:%M')" || echo "No hay cambios"
          git push
