name: Máquina Autoayuda - Groq Qwen3-32b (Prompt Optimizado)

on:
  schedule:
    - cron: "*/12 * * * *"   
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar 1 Bloque con Qwen3-32b
        run: |
          cat << 'EOF' > generate.py
          import requests, os, glob, time
          from datetime import datetime

          API_KEY = os.getenv("GROQ_API_KEY")
          if not API_KEY:
              print("❌ GROQ_API_KEY no encontrada")
              exit(1)

          existing = sorted(glob.glob("capitulo_*_bloque_*.txt"))
          if not existing:
              chapter_num = 1
              block_num = 1
          else:
              last = existing[-1]
              chapter_num = int(last.split("_")[1])
              block_num = int(last.split("_")[3].split(".")[0]) + 1
              if block_num > 7:
                  chapter_num += 1
                  block_num = 1

          titles = ["El Ancla Invisible", "La Jaula que Tú Construiste", "El Precio de Seguir Cómodo", "La Identidad que Te Mata Lentamente", "Por Qué Saboteas Tu Propio Éxito", "El Miedo que Nadie Habla", "Cuando Dejas de Mentirte a Ti Mismo", "La Versión de Ti que Está Esperando", "El Vacío que el Éxito No Llena"]

          title = titles[(chapter_num-1) % len(titles)]

          print(f"🚀 Capítulo {chapter_num} - Bloque {block_num}: {title}")

          prompt = f"""Eres un escritor experto en guiones spoken-word para audiolibros premium de autoayuda.

          Tarea: Genera **solo** el BLOQUE {block_num} de 7 del capítulo titulado "{title}".

          REGLAS ESTRICTAS:
          - Responde ÚNICAMENTE con el texto puro del bloque. Nada más. No uses <think>, razonamiento, explicaciones ni nada interno.
          - Frases muy cortas (máximo 12 palabras por frase).
          - Muchas pausas dramáticas con "...".
          - Saltos de línea frecuentes.
          - Muchas preguntas retóricas dirigidas al oyente ("¿...?", "tú", "te").
          - Construye tensión emocional progresiva.
          - Lenguaje sensorial y cinematográfico.
          - Ritmo lento, hipnótico y emocional.

          Ejemplo del estilo deseado:
          Te sientes atrapado...
          ...en una jaula invisible.
          ¿Quién la construyó?
          ...tú mismo.
          Con cada miedo que aceptaste...
          ...con cada duda que repetiste en silencio.
          ¿Te duele el pecho?
          ...porque sabes la verdad que escondes.

          Ahora genera solo el bloque {block_num} siguiendo exactamente este estilo.
          Mantén coherencia con el capítulo.

          Responde solo con el texto puro del bloque."""

          url = "https://api.groq.com/openai/v1/chat/completions"
          data = {
              "model": "qwen/qwen3-32b",
              "messages": [{"role": "user", "content": prompt}],
              "temperature": 0.68,
              "max_tokens": 900
          }
          headers = {
              "Authorization": f"Bearer {API_KEY}",
              "Content-Type": "application/json"
          }

          response = requests.post(url, headers=headers, json=data, timeout=40)

          if response.status_code != 200:
              print("Error:")
              print(response.text)
              exit(1)

          text = response.json()["choices"][0]["message"]["content"].strip()

          # Limpieza extra por si sale thinking
          if "<think>" in text:
              text = text.split("</think>")[-1].strip()

          filename = f"capitulo_{chapter_num:02d}_bloque_{block_num}.txt"
          with open(filename, "w", encoding="utf-8") as f:
              f.write(text)

          print(f"✅ Guardado: {filename} ({len(text.split())} palabras)")
          EOF

          python3 generate.py
        shell: bash

      - name: Commit y Push
        run: |
          git config --global user.name "AudiolibroBot"
          git config --global user.email "bot@yordev.ai"
          git add capitulo_*.txt
          git commit -m "🤖 Bloque Qwen3-32b optimizado - $(date '+%Y-%m-%d %H:%M')" || echo "No hay cambios"
          git push
