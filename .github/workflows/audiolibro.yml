name: Generador Audiolibro IA

on:
  schedule:
    - cron: "0 */6 * * *"  # cada 6 horas
  workflow_dispatch:

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Crear script Python
        run: |
          cat << 'EOF' > script.py
          import requests
          import os
          from datetime import datetime

          API_KEY = os.getenv("GEMINI_API_KEY")

          if not API_KEY:
              raise ValueError("API KEY no encontrada")

          prompt = """
          Actúa como un escritor experto en narrativa emocional para audiolibros virales en YouTube.

          Objetivo:
          Crear un capítulo 1 de aproximadamente 10 minutos con un GANCHO extremadamente fuerte en los primeros 60 segundos.

          Tema:
          La metáfora del barco y el ancla (bloqueo mental, estancamiento personal).

          Instrucciones:
          - Empieza con una frase impactante y directa
          - Usa pausas naturales
          - Genera emoción desde el inicio
          - Evita introducciones suaves
          - Haz que el oyente se identifique rápido

          IMPORTANTE:
          - Genera también 3 versiones diferentes del GANCHO al inicio
          - Usa lenguaje simple pero poderoso
          - Optimizado para narración con voz IA

          Salida:
          Texto listo para narración
          """

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={API_KEY}"

          headers = {
              "Content-Type": "application/json"
          }

          data = {
              "contents": [
                  {
                      "parts": [{"text": prompt}]
                  }
              ]
          }

          response = requests.post(url, headers=headers, json=data)

          if response.status_code != 200:
              raise Exception(f"Error API: {response.text}")

          result = response.json()

          text = result["candidates"][0]["content"]["parts"][0]["text"]

          filename = f"capitulo_{datetime.now().strftime('%Y%m%d_%H%M%S')}.txt"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(text)

          print("Archivo generado:", filename)
          EOF

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script
        run: python3 script.py

      - name: Subir resultado
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "Nuevo capítulo generado" || echo "Nada que commitear"
          git push
