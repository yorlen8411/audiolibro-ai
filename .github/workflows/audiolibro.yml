name: Generador Audiolibro IA - Capítulo 1

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar Bloque 9 (versión PRO con control de calidad)
        run: |
          cat << 'EOF' > generate_chapter.py
          import requests, os, glob
          from datetime import datetime

          API_KEY = os.getenv("GEMINI_API_KEY")
          if not API_KEY:
              raise ValueError("❌ GEMINI_API_KEY no encontrada")

          # Cargar automáticamente todos los bloques anteriores
          bloques = sorted(glob.glob("cap1_bloque_*.txt"))
          contexto = ""
          for i, archivo in enumerate(bloques, 1):
              with open(archivo, "r", encoding="utf-8") as f:
                  contexto += f"\n\nBLOQUE {i}:\n{f.read().strip()}\n"

          prompt = f"""Eres un escritor experto en audiolibros premium de desarrollo personal (nivel Audible y ElevenLabs).
          Estilo obligatorio: narrativo cinematográfico, emocional profundo, spoken-word. 
          Usa frases cortas. Muchas pausas dramáticas con "...". Repeticiones intencionales. Lenguaje sensorial. Ritmo lento y poderoso.

          Genera **SOLO** el BLOQUE 9 del Capítulo 1 titulado "El Ancla Invisible".
          Debe continuar exactamente después del Bloque 8.

          Aquí están los 8 bloques anteriores para mantener coherencia total:

          {contexto}

          REQUISITOS ESTRICTOS:
          - Longitud: entre 480 y 680 palabras.
          - Nunca cortes la idea a la mitad. Termina con un cierre fuerte.
          - Baja más profundo en el miedo al ser visto, al vacío interior o al momento de soltar el ancla.
          - Crea tensión emocional creciente.
          - Termina preparando al oyente para el siguiente nivel (el verdadero acto de soltar o la decisión irreversible).

          Responde ÚNICAMENTE con el texto del bloque. Sin títulos, sin explicaciones, sin "Bloque 9:"."""

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={API_KEY}"

          data = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {
                  "temperature": 0.85,
                  "topP": 0.92,
                  "maxOutputTokens": 4096,   # ← más tokens para que no corte
              },
              "safetySettings": [
                  {"category": "HARM_CATEGORY_HARASSMENT", "threshold": "BLOCK_NONE"},
                  {"category": "HARM_CATEGORY_HATE_SPEECH", "threshold": "BLOCK_NONE"},
                  {"category": "HARM_CATEGORY_SEXUALLY_EXPLICIT", "threshold": "BLOCK_NONE"},
                  {"category": "HARM_CATEGORY_DANGEROUS_CONTENT", "threshold": "BLOCK_NONE"}
              ]
          }

          response = requests.post(url, headers={"Content-Type": "application/json"}, json=data)
          
          if response.status_code != 200:
              raise Exception(f"API Error: {response.status_code} - {response.text}")

          text = response.json()["candidates"][0]["content"]["parts"][0]["text"].strip()

          timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
          filename = f"cap1_bloque_{timestamp}.txt"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(text)

          print(f"✅ BLOQUE 9 GENERADO: {filename}")
          print(f"Longitud: {len(text.split())} palabras")
          print("\\n--- VISTA PREVIA ---\\n")
          print(text[:700] + "..." if len(text) > 700 else text)
          EOF

          python3 generate_chapter.py
        shell: bash

      - name: Commit y Push
        run: |
          git config --global user.name "AudiolibroBot"
          git config --global user.email "bot@yordev.ai"
          git add cap1_bloque_*.txt
          git commit -m "🤖 Bloque 9 generado automáticamente - $(date '+%Y-%m-%d %H:%M')" || echo "No hay cambios"
          git push
